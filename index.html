<!DOCTYPE html>
<html lang="no">
<head>
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Scan">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan-trening – Random & Stafett</title>

  <style>
   body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: black;
  color: white;
  transition: background-color 0.15s ease;
}

.controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 420px;
  background: rgba(20,20,20,0.9);
  border-radius: 16px;
  padding: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.section {
  margin-bottom: 18px;
}

.section-title {
  font-weight: bold;
  margin-bottom: 8px;
  font-size: 15px;
  opacity: 0.9;
}

.colors {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.colors label {
  background: #222;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
}

.colors input {
  margin-right: 5px;
}

input[type="number"] {
  width: 70px;
  padding: 5px;
  border-radius: 6px;
  border: none;
  text-align: center;
  font-size: 14px;
}

.buttons {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  opacity: 0.9;
}

.start {
  background: #2ecc71;
  color: white;
}

.stop {
  background: #e74c3c;
  color: white;
}

.secondary {
  background: #3498db;
  color: white;
}

.hidden {
  display: none;
}
	
  </style>
</head>
<body>

<div class="controls">

  <div class="section">
    <div class="section-title">Velg farger</div>
    <div class="colors">
      <label><input type="checkbox" checked value="yellow">Gul</label>
      <label><input type="checkbox" checked value="blue">Blå</label>
      <label><input type="checkbox" checked value="red">Rød</label>
      <label><input type="checkbox" checked value="green">Grønn</label>
      <label><input type="checkbox" checked value="orange">Oransje</label>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Normal modus</div>
    Intervall:
    <input type="number" id="interval" value="2" min="0.3" step="0.1">
    
    <div class="buttons">
      <button class="start" onclick="startNormal()">Start</button>
      <button class="stop" onclick="stopAll()">Stopp</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Stafett</div>
    <div class="buttons">
      <button class="secondary" onclick="startStafett()">Start stafett</button>
    </div>
  </div>

</div>

<script>
let timer = null;
let isRunning = false;
let fakeChance = 0.25; // 25% lurepip
let beepSound = new Audio("langbeep.mp3");
beepSound.preload = "auto";
  
  function enterFocusMode() {
  document.querySelector(".controls").classList.add("hidden");
}

function exitFocusMode() {
  document.querySelector(".controls").classList.remove("hidden");
}

  function getActiveColors() {
    const checked = document.querySelectorAll('input[type="checkbox"]:checked');
    return Array.from(checked).map(cb => cb.value);
  }

  function randomColor() {
    const colors = getActiveColors();
    if (colors.length === 0) return null;
    const index = Math.floor(Math.random() * colors.length);
    return colors[index];
  }
  
  function changeColor() {
  const color = randomColor();
  if (!color) return;
  document.body.style.backgroundColor = color;
}

  /* ---------- NORMAL MODUS ---------- */

function startNormal() {
  stopAll();
  isRunning = true;
  enterFocusMode();
  showHint();

  const seconds = parseFloat(document.getElementById("interval").value);
  if (seconds <= 0) return;

  changeColor();
  timer = setInterval(changeColor, seconds * 1000);
}

  /* ---------- STAFETT MODUS ---------- */

function startStafett() {
  stopAll();
  isRunning = true;
  enterFocusMode();
  showHint();

  const delay = Math.random() * (6 - 3) + 5;

  timer = setTimeout(() => {
    beep();

const isFake = Math.random() < fakeChance;

if (isFake) {
  // LURE PIP – ingen farge
  document.body.style.backgroundColor = "black";

  timer = setTimeout(() => {
    stopAll();
  }, 2000); // kortere tid
} else {
  // VANLIG RUNDE
  const color = randomColor();
  if (!color) return;

  document.body.style.backgroundColor = color;

  timer = setTimeout(() => {
    stopAll();
  }, 5000);
}

  }, delay * 1000);
}

function stopAll() {
  if (timer) {
    clearTimeout(timer);
    clearInterval(timer);
    timer = null;
  }

  isRunning = false;
  document.body.style.backgroundColor = "black";
  exitFocusMode();
}

function beep() {
  const sound = beepSound.cloneNode();
  sound.play().catch(() => {});
}

function showHint() {
  const hint = document.createElement("div");
  hint.innerText = "Trykk for å stoppe";
  hint.style.position = "fixed";
  hint.style.top = "50%";
  hint.style.left = "50%";
  hint.style.transform = "translate(-50%, -50%)";
  hint.style.color = "white";
  hint.style.fontSize = "20px";
  hint.style.opacity = "0.8";
  hint.style.pointerEvents = "none";

  document.body.appendChild(hint);

  setTimeout(() => hint.remove(), 2000);
}

document.addEventListener("pointerdown", () => {
  beepSound.play().catch(() => {});
}, { once: true });
  
document.addEventListener("pointerdown", (e) => {
  if (isRunning && !e.target.closest("button") && !e.target.closest("input")) {
    stopAll();
  }
});

</script>

</body>
</html>
