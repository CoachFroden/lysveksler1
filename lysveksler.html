<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Scan-trening – Random & Stafett</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background-color: black;
      transition: background-color 0.2s;
    }

    .controls {
      position: fixed;
      bottom: 15px;
      background: rgba(0,0,0,0.65);
      padding: 15px;
      border-radius: 10px;
      color: white;
      max-width: 90%;
    }

    button {
      font-size: 15px;
      padding: 6px 12px;
      margin: 4px;
      cursor: pointer;
    }

    input[type="number"] {
      width: 60px;
      text-align: center;
    }

    label {
      margin-right: 10px;
    }
  </style>
</head>
<body>

<div class="controls">

  <strong>Velg farger:</strong><br>
  <label><input type="checkbox" checked value="yellow"> Gul</label>
  <label><input type="checkbox" checked value="blue"> Blå</label>
  <label><input type="checkbox" checked value="red"> Rød</label>
  <label><input type="checkbox" checked value="green"> Grønn</label>
  <label><input type="checkbox" checked value="orange"> Oransje</label>

  <hr>

  <strong>Normal modus</strong><br>
  Intervall (sek):
  <input type="number" id="interval" value="2" min="0.3" step="0.1">
  <br>
  <button onclick="startNormal()">Start</button>
  <button onclick="stopAll()">Stopp</button>

  <hr>

  <strong>Stafett-modus</strong><br>
  <button onclick="startStafett()">Start stafett</button>

</div>

<script>
  let timer = null;

  function getActiveColors() {
    const checked = document.querySelectorAll('input[type="checkbox"]:checked');
    return Array.from(checked).map(cb => cb.value);
  }

  function randomColor() {
    const colors = getActiveColors();
    if (colors.length === 0) return null;
    const index = Math.floor(Math.random() * colors.length);
    return colors[index];
  }

  function stopAll() {
    if (timer) {
      clearTimeout(timer);
      clearInterval(timer);
      timer = null;
    }
    document.body.style.backgroundColor = "black";
  }

  /* ---------- NORMAL MODUS ---------- */

  function startNormal() {
    stopAll();

    const seconds = parseFloat(document.getElementById("interval").value);
    if (seconds <= 0) return;

    changeColor();

    timer = setInterval(changeColor, seconds * 1000);
  }

  function changeColor() {
    const color = randomColor();
    if (!color) return;
    document.body.style.backgroundColor = color;
  }

  /* ---------- STAFETT MODUS ---------- */

  function startStafett() {
    stopAll();

    const delay = Math.random() * (6 - 3) + 5; // 5–10 sek

    timer = setTimeout(() => {
      beep();

      const color = randomColor();
      if (!color) return;

      document.body.style.backgroundColor = color;

      timer = setTimeout(() => {
        document.body.style.backgroundColor = "black";
      }, 5000);

    }, delay * 1000);
  }

  function beep() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    oscillator.type = "sine";
    oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
    oscillator.connect(audioCtx.destination);
    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.2);
  }
</script>

</body>
</html>
